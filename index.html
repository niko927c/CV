<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My CV</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
      color: #333;
    }
    header {
      background: #333;
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    .container {
      max-width: 800px;
      margin: 20px auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      border-bottom: 2px solid #eee;
      padding-bottom: 5px;
    }
    .section {
      margin-bottom: 20px;
    }
    ul {
      padding-left: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>Your Name</h1>
  <p>Email: your@email.com | Phone: +123456789</p>
</header>

<div class="container">

  <div class="section">
    <h2>Profile</h2>
    <p>A short summary about yourself.</p>
  </div>

  <div class="section">
    <h2>Experience</h2>
    <ul>
      <li><strong>Job Title</strong> - Company (Year - Year)<br>Short description of your role.</li>
    </ul>
  </div>

  <div class="section">
    <h2>Education</h2>
    <ul>
      <li>Degree - School (Year)</li>
    </ul>
  </div>

  <div class="section">
    <h2>Skills</h2>
    <ul>
      <li>Skill 1</li>
      <li>Skill 2</li>
      <li>Skill 3</li>
    </ul>
  </div>

</div>

</body>
</html>
